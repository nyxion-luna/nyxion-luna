name: update readme cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: generate light stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=catppuccin_latte&hide_border=true
          path: cards/stats.light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate light top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=catppuccin_latte&hide_border=true
          path: cards/top-langs.light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate light pmm pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=pmm&theme=catppuccin_latte&hide_border=true
          path: cards/pmm-pin.light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=catppuccin_mocha&hide_border=true
          path: cards/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=catppuccin_mocha&hide_border=true
          path: cards/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate pmm pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=pmm&theme=catppuccin_mocha&hide_border=true
          path: cards/pmm-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: commit cards
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add cards/*.svg
          git commit -m 'update readme.md cards' || exit 0
          git push